name: UI tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      loop_enabled:
        description: Keep every shard running until canceled or the time limit is reached
        type: boolean
        required: true
        default: false
      loop_delay_seconds:
        description: Seconds to wait between complete test iterations
        type: number
        required: true
        default: 60
      max_loop_minutes:
        description: Maximum continuous runtime in minutes
        type: number
        required: true
        default: 300
      session_enabled:
        description: Stay on BASE_URL for a long dwell session (not the quick page-health suite)
        type: boolean
        required: true
        default: false
      session_duration_minutes:
        description: How long each shard stays on BASE_URL (minutes, clamped 20–60)
        type: number
        required: true
        default: 20
  workflow_call:
    inputs:
      session_enabled:
        description: Stay on BASE_URL for a long dwell session
        type: boolean
        required: false
        default: false
      session_duration_minutes:
        description: Session dwell duration in minutes (clamped 20–60)
        type: number
        required: false
        default: 20

permissions:
  contents: read

env:
  BASE_URL: https://www.twitch.tv/strykerusa
  MAX_PAGES: 1
  SHARD_COUNT: 20
  LIGHTHOUSE_MIN_SCORE: 0.70

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.shards.outputs.matrix }}
      page_count: ${{ steps.shards.outputs.page_count }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run crawl
      - id: shards
        shell: bash
        run: |
          npm run shard
          echo "matrix=$(cat test-data/shards/matrix.json)" >> "$GITHUB_OUTPUT"
          echo "page_count=$(node -p "require('./test-data/pages.json').length")" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: discovered-pages
          path: test-data/
          retention-days: 90

  test:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        shard: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: discovered-pages
          path: test-data
      - uses: actions/cache@v4
        with:
          path: tests/visual.spec.ts-snapshots
          key: visual-${{ runner.os }}-${{ hashFiles('test-data/pages.json') }}-${{ matrix.shard }}-${{ github.run_id }}
          restore-keys: |
            visual-${{ runner.os }}-${{ hashFiles('test-data/pages.json') }}-${{ matrix.shard }}-
      - name: Run shard
        env:
          PAGES_FILE: test-data/shards/shard-${{ matrix.shard }}.json
          LOOP_ENABLED: ${{ inputs.loop_enabled || false }}
          LOOP_DELAY_SECONDS: ${{ inputs.loop_delay_seconds || 60 }}
          MAX_LOOP_MINUTES: ${{ inputs.max_loop_minutes || 300 }}
          # Long dwell: keep Chromium on BASE_URL (default suite exits in seconds).
          SESSION_ENABLED: ${{ inputs.session_enabled || false }}
          SESSION_DURATION_MINUTES: ${{ inputs.session_duration_minutes || 20 }}
        shell: bash
        run: |
          # Session dwell needs a Playwright budget larger than the default 60s.
          # Duration is minutes; buffer covers navigation + screenshot + teardown.
          if [ "$SESSION_ENABLED" = "true" ]; then
            DURATION_MIN="${SESSION_DURATION_MINUTES:-20}"
            # Clamp to 20–60 unless caller overrides in a custom fork.
            if [ "$DURATION_MIN" -lt 20 ]; then DURATION_MIN=20; fi
            if [ "$DURATION_MIN" -gt 60 ]; then DURATION_MIN=60; fi
            # TEST_TIMEOUT_MS is milliseconds (not seconds).
            export TEST_TIMEOUT_MS=$((DURATION_MIN * 60 * 1000 + 5 * 60 * 1000))
            echo "Session dwell enabled: ${DURATION_MIN}m on ${BASE_URL} (TEST_TIMEOUT_MS=${TEST_TIMEOUT_MS})"
          fi

          # Visual baselines are only needed for the full suite, not session dwell.
          if [ "$SESSION_ENABLED" != "true" ]; then
            if ! compgen -G 'tests/visual.spec.ts-snapshots/*-linux.png' > /dev/null; then
              npx playwright test tests/visual.spec.ts --update-snapshots
            fi
          fi

          # Prefer the dedicated session suite when dwell is requested so other
          # short tests do not open/close the tab and end the "stay on page" goal.
          run_tests() {
            if [ "$SESSION_ENABLED" = "true" ]; then
              npx playwright test tests/session.spec.ts --project=desktop
            else
              npx playwright test
            fi
          }

          if [ "$LOOP_ENABLED" != "true" ]; then
            run_tests
            exit $?
          fi

          STARTED_AT=$(date +%s)
          END_AT=$((STARTED_AT + MAX_LOOP_MINUTES * 60))
          ITERATION=1
          ANY_FAILURE=0

          while [ "$(date +%s)" -lt "$END_AT" ]; do
            echo "::group::Shard ${{ matrix.shard }} iteration $ITERATION"
            if REPORT_RUN_ID="iteration-$ITERATION" \
              TEST_RESULTS_DIR="test-results/iteration-$ITERATION" \
              BLOB_REPORT_FILE="blob-report/shard-${{ matrix.shard }}-iteration-$ITERATION.zip" \
              run_tests; then
              echo "Iteration $ITERATION passed"
            else
              ANY_FAILURE=1
              echo "Iteration $ITERATION failed; continuing until canceled or time limit"
            fi
            echo "::endgroup::"
            ITERATION=$((ITERATION + 1))

            NOW=$(date +%s)
            if [ "$NOW" -lt "$END_AT" ]; then
              REMAINING=$((END_AT - NOW))
              if [ "$REMAINING" -lt "$LOOP_DELAY_SECONDS" ]; then
                sleep "$REMAINING"
              else
                sleep "$LOOP_DELAY_SECONDS"
              fi
            fi
          done

          echo "Completed $((ITERATION - 1)) iterations on shard ${{ matrix.shard }}"
          exit "$ANY_FAILURE"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-${{ matrix.shard }}
          path: |
            blob-report/
            test-results/
            artifacts/
            lighthouse-reports/
            accessibility-reports/
            tests/visual.spec.ts-snapshots/
          if-no-files-found: ignore
          retention-days: 90

  report:
    needs: [discover, test]
    if: always()
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: test-artifacts-*
          path: downloaded
          merge-multiple: false
      - name: Collect blob reports
        shell: bash
        run: |
          mkdir -p all-blob-reports
          find downloaded -path '*/blob-report/*.zip' -exec cp {} all-blob-reports/ \;
      - name: Merge Playwright report
        if: ${{ hashFiles('all-blob-reports/*.zip') != '' }}
        run: npm run merge-reports
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: combined-report
          path: |
            playwright-report/
            downloaded/
          retention-days: 90
      - name: Workflow summary
        shell: bash
        run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            PASSED="${{ needs.discover.outputs.page_count }}"
            FAILED="0"
          else
            PASSED="See combined report"
            FAILED="See combined report"
          fi
          {
            echo "## UI monitoring summary"
            echo "| Metric | Result |"
            echo "|---|---|"
            echo "| Passed pages | $PASSED |"
            echo "| Failed pages | $FAILED |"
            echo "| Accessibility issues | See accessibility reports |"
            echo "| Performance scores | See Lighthouse reports |"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Notify Slack on failure
        if: ${{ needs.test.result != 'success' && env.SLACK_WEBHOOK_URL != '' }}
        env:
          WEBHOOK: ${{ env.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\"Twitch strykerusa UI tests failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "$WEBHOOK"
      - name: Notify Discord on failure
        if: ${{ needs.test.result != 'success' && env.DISCORD_WEBHOOK_URL != '' }}
        env:
          WEBHOOK: ${{ env.DISCORD_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "{\"content\":\"Twitch strykerusa UI tests failed: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "$WEBHOOK"
      - name: Fail workflow when tests failed
        if: ${{ needs.test.result != 'success' }}
        run: exit 1
